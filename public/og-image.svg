<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.8" opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="white" fill-opacity="0.15"/>
  <!-- Medical cross in logo -->
  <rect x="103" y="96" width="26" height="40" rx="5" fill="white"/>
  <rect x="96" y="103" width="40" height="26" rx="5" fill="white"/>

  <!-- App name -->
  <text x="174" y="127" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white">NurseAbroad</text>

  <!-- Main headline -->
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">Your nursing career,</text>
  <text x="80" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#BFDBFE">anywhere in the world.</text>

  <!-- Sub-line -->
  <text x="80" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="white" fill-opacity="0.8">Jobs in UK, USA, Australia, Canada, EU &amp; more — free forever.</text>

  <!-- Badge pills -->
  <rect x="80" y="520" width="190" height="52" rx="26" fill="white" fill-opacity="0.15"/>
  <text x="175" y="552" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="white">1,000+ Jobs</text>

  <rect x="286" y="520" width="170" height="52" rx="26" fill="white" fill-opacity="0.15"/>
  <text x="371" y="552" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="white">8+ Countries</text>

  <rect x="472" y="520" width="140" height="52" rx="26" fill="white" fill-opacity="0.15"/>
  <text x="542" y="552" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="white">100% Free</text>

  <!-- Right side device mockup area (simple abstract) -->
  <rect x="820" y="140" width="300" height="560" rx="32" fill="white" fill-opacity="0.08" transform="rotate(-8 820 140)"/>
  <rect x="850" y="120" width="300" height="560" rx="32" fill="white" fill-opacity="0.06" transform="rotate(-4 850 120)"/>
  <rect x="880" y="100" width="300" height="560" rx="32" fill="white" fill-opacity="0.12"/>
</svg>
